const uploadToImgBB = (file) => new Promise((resolve, reject) => {
  const fd = new FormData();
  fd.append("image", file);
  fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:"POST", body:fd })
    .then(r=>r.json())
    .then(data=>{ if(data.success) resolve(data.data.url); else reject(new Error("ImgBB error")); })
    .catch(reject);
});

  return `${jours[date.getDay()]} ${d} ${mois[m-1]}`;
};

  if(!c) return false;

  if(c.statutClient === "CDI" && c.periodeEssaiValidee === null) return false;

// ─── CSS ─────────────────────────────────────────────────────────────────
const CSS = `@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap");
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FBF7F0;--surface:#FFFFFF;--surface2:#F2E8DA;
  --border:#E5D9C6;--border2:#D8C7AE;
  --ardoise:#2C3E50;--ardoise-l:#3D5266;
  --text:#2C3E50;--text2:#5A6B7B;--text3:#9AA7B2;
  --accent:#C1614F;--accent-d:#A14E3F;--accent-l:#F5E2DD;--accent-l2:#EBC6BB;
  --green:#16A34A;--green-bg:#DCFCE7;
  --red:#DC2626;--red-bg:#FEE2E2;
  --orange:#D97706;--orange-bg:#FEF3C7;
  --sh:0 2px 14px rgba(44,62,80,.07);--sh-md:0 6px 24px rgba(44,62,80,.12);--sh-lg:0 10px 44px rgba(44,62,80,.18);
}
body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;font-size:14px;line-height:1.5;}
.brand-font{font-family:"Sora",sans-serif;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ardoise);}
.login-card{background:var(--surface);border-radius:20px;padding:38px 36px;width:360px;box-shadow:var(--sh-lg);}
.login-logo{width:50px;height:50px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;margin:0 auto 18px;font-family:"Sora",sans-serif;}
.login-title{font-family:"Sora",sans-serif;font-weight:800;font-size:21px;text-align:center;color:var(--text);margin-bottom:4px;letter-spacing:-.02em;}
.login-sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:26px;}
.login-err{background:var(--red-bg);color:var(--red);font-size:12px;font-weight:600;padding:9px 12px;border-radius:9px;margin-bottom:14px;text-align:center;}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sb{width:222px;min-height:100vh;background:var(--ardoise);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;}
.sb-brand{padding:22px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;font-family:"Sora",sans-serif;}
.sb-name{font-weight:800;font-size:17px;color:#fff;font-family:"Sora",sans-serif;letter-spacing:-.02em;}
.sb-sub{font-size:10px;color:rgba(255,255,255,.45);font-weight:500;letter-spacing:.06em;}
.sb-nav{padding:14px 10px;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;font-size:13px;font-weight:600;margin-bottom:3px;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:var(--accent);color:#fff;}
.sb-footer{padding:16px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{font-size:12px;color:rgba(255,255,255,.85);font-weight:700;margin-bottom:8px;}
.logout-btn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.75);padding:8px 11px;border-radius:9px;cursor:pointer;font-family:"Inter",sans-serif;font-size:12px;font-weight:600;width:100%;transition:all .15s;}
.logout-btn:hover{background:rgba(255,255,255,.16);color:#fff;}

.content{display:flex;flex-direction:column;flex:1;min-width:0;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.pt{font-size:21px;font-weight:800;color:var(--text);font-family:"Sora",sans-serif;letter-spacing:-.02em;}
.ps{color:var(--text3);font-size:12px;font-weight:500;margin-top:2px;}
.tb-right{display:flex;align-items:center;gap:10px;}
.main{padding:24px 28px;overflow-y:auto;flex:1;}

.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:8px 13px;width:230px;color:var(--text3);}

function useToasts(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((text,type="info")=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,text,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3400);
  },[]);
  return [toasts,add];
}

function useIsMobile(){
  const [m,setM]=useState(typeof window!=="undefined" && window.innerWidth<=768);
  useEffect(()=>{
    const h=()=>setM(window.innerWidth<=768);
    window.addEventListener("resize",h);
    return ()=>window.removeEventListener("resize",h);
  },[]);
  return m;
}

// ─── LOGIN SCREEN ────────────────────────────────────────────────────────
function LoginScreen(){
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  const submit=(e)=>{
    e.preventDefault();
    setError("");
    if(!email||!password){setError("Renseigne email et mot de passe.");return;}
    setLoading(true);
    fsSignIn(auth,email.trim(),password)
      .catch(err=>{
        const map={
          "auth/invalid-email":"Email invalide.",
          "auth/user-not-found":"Compte introuvable.",
          "auth/wrong-password":"Mot de passe incorrect.",
          "auth/invalid-credential":"Email ou mot de passe incorrect.",
          "auth/too-many-requests":"Trop de tentatives, réessaie plus tard."
        };
        setError(map[err.code]||"Erreur de connexion.");
      })
      .finally(()=>setLoading(false));
  };

  return(
    <div className="login-wrap">
      <form className="login-card" onSubmit={submit}>
        <div className="login-logo">S</div>
        <div className="login-title">soloc' CRM</div>
        <div className="login-sub">Connexion à l'espace pro</div>
        {error&&<div className="login-err">{error}</div>}
        <div className="fg">
          <label className="fl">Email</label>
          <input className="fi" type="email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus/>
        </div>
        <div className="fg">
          <label className="fl">Mot de passe</label>
          <input className="fi" type="password" value={password} onChange={e=>setPassword(e.target.value)}/>
        </div>
        <button className="btn btn-p btn-block" type="submit" disabled={loading} style={{marginTop:8}}>
          {loading?"Connexion…":"Se connecter"}
        </button>
      </form>
    </div>
  );
}

// ─── LEAD CARD ───────────────────────────────────────────────────────────
function LeadCard({lead, onOpen, onDragStart, onRelanceAction, onTogglePaid, isDupe}){
  const stale = ACTIVE_ALERT_COLS.includes(lead.column) && daysSince(lead.lastActivity)>=3;
  const cls = ["kb-card"];
  if(stale) cls.push("warn");
  if(lead.column==="valide"&&lead.paid) cls.push("paid");
  const typoArr = asArray(lead.criteria && lead.criteria.typologie);
  const critSummary = typoArr.length ? (typoArr.join("/")+" · "+(lead.criteria.secteur||"—")+" · "+(lead.criteria.loyer?lead.criteria.loyer+"€":"—")) : null;

  return(
    <div className={cls.join(" ")} draggable onDragStart={e=>onDragStart(e,lead.id)} onClick={()=>onOpen(lead)}>
      <div className="kb-card-name">{lead.name}</div>
      <div className="kb-meta">
        {lead.phone&&<span>📞 {lead.phone}</span>}
        {lead.email&&<span>✉️ {lead.email}</span>}
      </div>
      {critSummary&&<div className="kb-crit">{critSummary}</div>}
      <div className="kb-badges">
        {isDupe&&<span className="badge orange">⚠ Doublon possible</span>}
        {lead.column==="relance"&&lead.relanceCount>0&&<span className="badge relance">Relance {lead.relanceCount}/3</span>}
        {stale&&<span className="badge orange">⚠ {Math.floor(daysSince(lead.lastActivity))}j sans suivi</span>}
        {lead.column==="valide"&&lead.paid&&<span className="badge green">✓ Payé</span>}
      </div>
      {lead.column==="relance"&&(
        <button className="relance-act" onClick={e=>{e.stopPropagation();onRelanceAction(lead);}}>Pas de réponse</button>
      )}
      {lead.column==="valide"&&(
        <div className="paid-row" onClick={e=>{e.stopPropagation();onTogglePaid(lead);}}>
          <input type="checkbox" checked={!!lead.paid} onChange={()=>{}} readOnly/> Marquer payé

        <div className="rdv-bubble">

            <div className="wa-bubble-sub">Envoyé sur WhatsApp</div>
          </div>
        </div>
      )}

  );

// ─── KANBAN BOARD ────────────────────────────────────────────────────────
function KanbanBoard({leads, onOpen, onMove, onRelanceAction, onTogglePaid, isMobile, dupeIds}){
  const [dragOver,setDragOver]=useState(null);
  const [selStage,setSelStage]=useState("premier_contact");
  const dragId=useRef(null);

  const sortCol=(colLeads)=>{
    return [...colLeads].sort((a,b)=>{
      const sa = ACTIVE_ALERT_COLS.includes(a.column)&&daysSince(a.lastActivity)>=3;
      const sb = ACTIVE_ALERT_COLS.includes(b.column)&&daysSince(b.lastActivity)>=3;
      if(sa&&!sb) return -1;
      if(sb&&!sa) return 1;
      if(sa&&sb) return daysSince(b.lastActivity)-daysSince(a.lastActivity);
      return new Date(b.lastActivity||0)-new Date(a.lastActivity||0);
    });
  };

  if(isMobile){
    const counts={};
    PIPELINE_COLS.forEach(c=>{counts[c.id]=leads.filter(l=>l.column===c.id).length;});
    const colLeads=sortCol(leads.filter(l=>l.column===selStage));
    return(
      <div>
        <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:12,marginBottom:6}}>
          {PIPELINE_COLS.map(col=>{
            const on=selStage===col.id;
            return(
              <button key={col.id} onClick={()=>setSelStage(col.id)} style={{padding:"7px 13px",borderRadius:20,border:"1.5px solid",borderColor:on?"var(--accent)":"var(--border2)",background:on?"var(--accent)":"var(--surface2)",color:on?"#fff":"var(--text2)",fontSize:12,fontWeight:700,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6,fontFamily:"'Inter',sans-serif",cursor:"pointer",flexShrink:0}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:col.color,display:"inline-block"}}></span>{col.label}
                <span style={{background:on?"rgba(255,255,255,.25)":"var(--border2)",borderRadius:20,padding:"0 6px",fontSize:11}}>{counts[col.id]}</span>
              </button>
            );
          })}
        </div>
        {colLeads.length===0
          ?<div style={{textAlign:"center",padding:"40px 0",color:"var(--text3)",fontSize:13,fontStyle:"italic"}}>Aucun lead à cette étape</div>
          :colLeads.map(lead=>(
            <LeadCard key={lead.id} lead={lead} onOpen={onOpen} onDragStart={()=>{}} onRelanceAction={onRelanceAction} onTogglePaid={onTogglePaid} isDupe={dupeIds&&dupeIds.has(lead.id)}/>
          ))}
      </div>
    );
  }

  return(
    <div className="kb-wrap">
      {PIPELINE_COLS.map(col=>{
        const colLeads = sortCol(leads.filter(l=>l.column===col.id));
        return(
          <div key={col.id} className={"kb-col"+(dragOver===col.id?" drag-over":"")}
            onDragOver={e=>{e.preventDefault();setDragOver(col.id);}}
            onDragLeave={()=>setDragOver(null)}
            onDrop={e=>{e.preventDefault();setDragOver(null);if(dragId.current)onMove(dragId.current,col.id);dragId.current=null;}}>
            <div className="kb-col-hd">
              <span className="kb-dot" style={{background:col.color}}/>
              <span className="kb-col-title">{col.label}</span>
              <span className="kb-count">{colLeads.length}</span>
            </div>
            {colLeads.length===0&&<div className="kb-empty">Aucun lead</div>}
            {colLeads.map(lead=>(
              <LeadCard key={lead.id} lead={lead} onOpen={onOpen}
                onDragStart={(e,id)=>{dragId.current=id;e.dataTransfer.setData("text",id);}}
                onRelanceAction={onRelanceAction} onTogglePaid={onTogglePaid} isDupe={dupeIds&&dupeIds.has(lead.id)}/>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ─── MERGE MODAL (fusion de doublons) ────────────────────────────────────
function MergeModal({leadA, leadB, onClose, onConfirm}){
  const [keepId,setKeepId]=useState(null);
  const colLabel=(id)=>{const c=PIPELINE_COLS.find(x=>x.id===id);return c?c.label:(id||"—");};
  const critSum=(l)=>{const t=asArray(l.criteria&&l.criteria.typologie);return t.length?(t.join("/")+" · "+((l.criteria&&l.criteria.secteur)||"—")):"—";};
  const canal=(l)=>{ if(l.calendlyRdv&&l.whatsappContact) return "Calendly + WhatsApp"; if(l.calendlyRdv) return "Calendly"; if(l.whatsappContact) return "WhatsApp"; return "Manuel"; };
  const card=(l)=>{
    const sel=keepId===l.id;
    return(
      <div onClick={()=>setKeepId(l.id)} style={{border:"2px solid",borderColor:sel?"var(--accent)":"var(--border)",borderRadius:12,padding:13,cursor:"pointer",background:"var(--surface)"}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:8}}>{l.name}</div>
        <div style={{fontSize:11,color:"var(--text2)",lineHeight:1.9}}>
          <div>📞 {l.phone||"—"}</div>
          <div>✉️ {l.email||"—"}</div>
          <div>Étape : <b>{colLabel(l.column)}</b></div>
          <div>Critères : {critSum(l)}</div>
          <div>Canal : {canal(l)}</div>
          <div>Créée le {fmtDate(l.createdAt)}</div>
        </div>
        <div style={{marginTop:10,padding:7,borderRadius:8,textAlign:"center",fontSize:12,fontWeight:700,background:sel?"var(--accent)":"var(--surface2)",color:sel?"#fff":"var(--text2)"}}>{sel?"✓ Principal":"Garder comme principal"}</div>
      </div>
    );
  };
  const keep = keepId===leadA.id?leadA:(keepId===leadB.id?leadB:null);
  const drop = keep?(keep.id===leadA.id?leadB:leadA):null;
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Fusionner les doublons</div>
        <div className="modal-sub">Choisis la fiche à conserver comme principale. L'autre sera fusionnée dedans puis supprimée.</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          {card(leadA)}
          {card(leadB)}
        </div>
        <div style={{background:"var(--surface2)",borderRadius:9,padding:"11px 13px",fontSize:12,color:"var(--text2)",lineHeight:1.6,marginBottom:14}}>
          {keep
            ? "Fiche conservée : "+keep.name+" (étape "+colLabel(keep.column)+"). On complète ses champs vides depuis l'autre, on cumule les critères, on garde les canaux Calendly/WhatsApp, on fusionne historiques et remarques, puis « "+drop.name+" » est supprimée."
            : "Sélectionne la fiche principale ci-dessus pour voir le résultat."}
        </div>
        <div className="fa">
          <button className="btn btn-g" onClick={onClose}>Annuler</button>
          <button className="btn btn-p" disabled={!keep} onClick={()=>onConfirm(keep,drop)}><Ic n="check" s={13}/>Fusionner</button>
        </div>
      </div>
    </div>
  );
}

// ─── RECHERCHE TABLE ─────────────────────────────────────────────────────
function RechercheTable({leads,search}){
  const q=search.toLowerCase();
  const rows = leads.filter(l=>l.column==="en_recherche").filter(l=>!q||l.name.toLowerCase().includes(q));

  if(rows.length===0){
    return(
      <div className="empty-state">
        <div className="es-ic">🔍</div>
        <div className="es-t">Aucune recherche en cours</div>
        <div>Les clients passés en « En recherche » dans le Pipeline apparaîtront ici.</div>
      </div>
    );
  }

  return(
    <div style={{overflowX:"auto"}}>
    <table className="list-table">
      <thead><tr>
        <th>Client</th><th>Statut</th><th>Typologie</th><th>Surface</th><th>Loyer max</th><th>Secteur</th><th>Logement</th><th>Entrée souhaitée</th><th>Prestations supp.</th>
      </tr></thead>
      <tbody>
        {rows.map(l=>(
          <tr key={l.id}>
            <td className="td-name">{l.name}</td>
            <td>{l.criteria.statutClient}{l.criteria.statutClient==="CDI"&&(l.criteria.periodeEssaiValidee?" (essai validé)":" (essai en cours)")}</td>
            <td>{asArray(l.criteria.typologie).join(", ")||"—"}</td>
            <td>{l.criteria.surface} m²</td>
            <td>{l.criteria.loyer} €</td>
            <td>{l.criteria.secteur}</td>
            <td>{asArray(l.criteria.etatLogement).join(" / ")||"Indifférent"}</td>
            <td>{l.criteria.dateAsap?"⚡ Dès que possible":fmtDate(l.criteria.dateEntreeSouhaitee)}</td>
            <td>{l.criteria.prestationsSupp||"—"}</td>
          </tr>
        ))}
      </tbody>
    </table>
    </div>
  );
}

// ─── CONSTANTS BIENS ─────────────────────────────────────────────────────
const ANNEXES_LIST = ["Cave","Parking collectif","Place de parking","Garage fermé","Balcon","Terrasse","Cuisine équipée","Ascenseur","Gardien"];
const FRAIS_PAR_M2 = 13.12;

// ─── HONORAIRES CALC ─────────────────────────────────────────────────────
function HonorairesCalc({surface, onSelect}){
  const [profil,setProfil]=useState(null);
  const [customVal,setCustomVal]=useState("");
  const frais = Math.round((parseFloat(surface)||0)*FRAIS_PAR_M2);
  const honos = profil==="etudiant"?890:profil==="cdi"?990:profil==="autre"?(parseInt(customVal)||null):null;
  const total = (honos&&frais)?honos+frais:null;
  const labelMap={"etudiant":"Étudiant","cdi":"CDI essai validé","autre":"Autre profil"};
  useEffect(()=>{
    if(onSelect) onSelect({profil,label:profil?labelMap[profil]:null,honos,frais,total});
  },[profil,customVal]);
  return(
    <div>
      <div className="hono-pills">
        {[["etudiant","Étudiant","890 €"],["cdi","CDI essai validé","990 €"],["autre","Autre profil","Sur devis"]].map(([k,l,p])=>(
          <div key={k} className={"hono-pill"+(profil===k?" active":"")} onClick={()=>setProfil(k)}>
            <div className="hono-pill-title">{l}</div>
            <div className="hono-pill-price">{p}</div>
          </div>
        ))}
      </div>
      {profil==="autre"&&(
        <div className="hono-custom-row">
          <span>Nos honoraires :</span>
          <input className="fi" type="number" value={customVal} onChange={e=>setCustomVal(e.target.value)} placeholder="ex: 750"/>
          <span>€</span>
        </div>
      )}
      {profil&&(profil!=="autre"||customVal)?(
        <div className="hono-recap">
          <div className="hono-recap-row"><span className="hono-recap-label">Honoraires SOLOC'</span><span className="hono-recap-val">{honos} €</span></div>
          <div className="hono-recap-row"><span className="hono-recap-label">Frais d'agence ({surface||"?"} m² × 13,12 €)</span><span className="hono-recap-val">{frais} €</span></div>
          <div className="hono-recap-row"><span className="hono-recap-label" style={{fontWeight:700,color:"var(--text)"}}>Total client</span><span className="hono-recap-val hono-recap-total">{total} €</span></div>
        </div>
      ):(
        profil&&<div style={{fontSize:11,color:"var(--text3)",textAlign:"center",padding:"6px 0"}}>Saisis le montant pour voir le récap</div>
      )}
      <div className="hono-note">Paiement au résultat · Zéro frais avant signature du bail</div>
    </div>
  );
}

// ─── BIEN FORM MODAL ─────────────────────────────────────────────────────
const blankBien = {titre:"",adresse:"",typologie:"",surface:"",loyer:"",depotGarantie:"",etage:"",meuble:false,dateDisponibilite:"",annexes:[],description:"",photos:[]};

function BienFormModal({bien, onSave, onClose, onDelete}){
  const editing=!!bien;
  const [form,setForm]=useState(editing?{...blankBien,...bien}:{...blankBien});
  const [uploading,setUploading]=useState(false);
  const [uploadPct,setUploadPct]=useState(0);
  const [err,setErr]=useState("");
  const fileRef=useRef();
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const toggleAnnexe=(a)=>setForm(p=>({...p,annexes:p.annexes.includes(a)?p.annexes.filter(x=>x!==a):[...p.annexes,a]}));

  const uploadPhotos=(files)=>{
    if(!files||!files.length) return;
    setUploading(true);
    setUploadPct(0);
    const arr=Array.from(files);
    let done=0;
    Promise.all(arr.map(file=>
      uploadToImgBB(file).then(url=>{ done++; setUploadPct(Math.round(done/arr.length*100)); return url; })
    )).then(urls=>{
      setForm(p=>({...p,photos:[...(p.photos||[]),...urls]}));
      setUploading(false); setUploadPct(0);
    }).catch(()=>{ setErr("Erreur upload — vérifie ta connexion."); setUploading(false); });
  };

  const removePhoto=(idx)=>setForm(p=>({...p,photos:p.photos.filter((_,i)=>i!==idx)}));

  const submit=()=>{
    if(!form.adresse.trim()){setErr("L'adresse est obligatoire.");return;}
    if(!form.loyer){setErr("Le loyer est obligatoire.");return;}
    setErr("");
    onSave(form);
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{width:620}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{editing?"Modifier le bien":"Ajouter un bien"}</div>
        {err&&<div className="ferr">{err}</div>}

        <div className="modal-section">Informations principales</div>
        <div className="fr">
          <div className="fg"><label className="fl">Adresse *</label><input className="fi" value={form.adresse} onChange={e=>set("adresse",e.target.value)} placeholder="14 rue Vendôme, 69006 Lyon"/></div>
          <div className="fg"><label className="fl">Secteur / Quartier</label><input className="fi" value={form.titre} onChange={e=>set("titre",e.target.value)} placeholder="Brotteaux, Lyon 6…"/></div>
        </div>
        <div className="fr">
          <div className="fg"><label className="fl">Typologie</label>
            <select className="fi" value={form.typologie} onChange={e=>set("typologie",e.target.value)}>
              <option value="">—</option>
              {["Studio","T1","T2","T3","T4","T5+"].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Surface (m²)</label><input className="fi" type="number" value={form.surface} onChange={e=>set("surface",e.target.value)}/></div>
        </div>
        <div className="fr">
          <div className="fg"><label className="fl">Loyer CC (€) *</label><input className="fi" type="number" value={form.loyer} onChange={e=>set("loyer",e.target.value)}/></div>
          <div className="fg"><label className="fl">Dépôt de garantie (€)</label><input className="fi" type="number" value={form.depotGarantie} onChange={e=>set("depotGarantie",e.target.value)}/></div>
        </div>
        <div className="fr">
          <div className="fg"><label className="fl">Étage</label><input className="fi" value={form.etage} onChange={e=>set("etage",e.target.value)} placeholder="Ex: 3e / 5 · Ascenseur"/></div>
          <div className="fg"><label className="fl">Date de disponibilité</label><input className="fi" type="date" value={form.dateDisponibilite} onChange={e=>set("dateDisponibilite",e.target.value)}/></div>
        </div>
        <div className="fg">
          <label className="fl">État</label>
          <div className="seg">
            <button type="button" className={"seg-btn"+(!form.meuble?" active":"")} onClick={()=>set("meuble",false)}>Vide</button>
            <button type="button" className={"seg-btn"+(form.meuble?" active":"")} onClick={()=>set("meuble",true)}>Meublé</button>
          </div>
        </div>

        <div className="modal-section">Annexes</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:8}}>
          {ANNEXES_LIST.map(a=>(
            <button key={a} type="button" onClick={()=>toggleAnnexe(a)}
              className="badge"
              style={{padding:"4px 10px",border:"1.5px solid",borderColor:form.annexes.includes(a)?"var(--accent)":"var(--border2)",background:form.annexes.includes(a)?"var(--accent-l)":"var(--surface2)",color:form.annexes.includes(a)?"var(--accent-d)":"var(--text2)",cursor:"pointer",fontSize:12,fontWeight:700,borderRadius:20}}>
              {a}
            </button>
          ))}
        </div>

        <div className="modal-section">Description</div>
        <textarea className="fi" rows="3" value={form.description} onChange={e=>set("description",e.target.value)} placeholder="Points forts, remarques, informations utiles…"/>

        <div className="modal-section">Photos</div>
        <div className="upload-zone" onClick={()=>!uploading&&fileRef.current.click()}>
          <Ic n="upload" s={18}/><br/>
          {uploading?`Upload en cours… ${uploadPct}%`:"Cliquer pour ajouter des photos (plusieurs possibles)"}
          {uploading&&<div className="upload-progress"><div className="upload-progress-bar" style={{width:uploadPct+"%"}}/></div>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>uploadPhotos(e.target.files)}/>
        {form.photos&&form.photos.length>0&&(
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
            {form.photos.map((url,i)=>(
              <div key={i} style={{position:"relative"}}>

              </div>
            ))}
          </div>
        )}

        <div className="fa">
          {editing&&<button className="btn btn-g" style={{color:"var(--red)"}} onClick={()=>onDelete(bien)}><Ic n="trash" s={13}/>Supprimer</button>}

          <button className="btn btn-p" onClick={submit} disabled={uploading}><Ic n="check" s={13}/>{editing?"Enregistrer":"Ajouter"}</button>
        </div>
      </div>
    </div>
  );
}

function BiensPage({addToast}){
  const [biens,setBiens]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null); // null | {type:'add'} | {type:'edit',bien} | {type:'detail',bien}

  useEffect(()=>{
    const unsub=fsOnSnapshot(fsCollection(db,"biens"),snap=>{
      const data=snap.docs.map(d=>({id:d.id,...d.data()}));
      data.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
      setBiens(data); setLoading(false);
    },()=>addToast("Erreur chargement biens","error"));
    return unsub;
  },[]);

  const saveBien=(form)=>{
    if(modal?.type==="edit"){
      fsUpdateDoc(fsDocRef(db,"biens",modal.bien.id),{...form,updatedAt:nowISO()})
        .then(()=>{addToast("✓ Bien mis à jour");setModal(null);})
        .catch(()=>addToast("Erreur","error"));
    } else {
      fsAddDoc(fsCollection(db,"biens"),{...form,createdAt:nowISO()})
        .then(()=>{addToast("✓ Bien ajouté");setModal(null);})
        .catch(()=>addToast("Erreur","error"));
    }
  };

  const deleteBien=(bien)=>{
    if(!confirm("Supprimer ce bien ?")) return;
    fsDeleteDoc(fsDocRef(db,"biens",bien.id))
      .then(()=>{addToast("Bien supprimé");setModal(null);})
      .catch(()=>addToast("Erreur","error"));
  };

  const q=search.toLowerCase();
  const rows=biens.filter(b=>!q||(b.adresse||"").toLowerCase().includes(q)||(b.titre||"").toLowerCase().includes(q)||(b.typologie||"").toLowerCase().includes(q));

  const BienThumb=({b})=>{
    const cover=b.photos&&b.photos[0];
    const titre=b.typologie&&b.surface?`${b.typologie} · ${b.surface} m²`:"Bien";
    return(
      <div className="bien-card" onClick={()=>setModal({type:"detail",bien:b})}>
        <div className="bien-card-photo">
          {cover?<img src={cover} alt={titre}/>:<><Ic n="img" s={28}/></>}
        </div>
        <div className="bien-card-body">
          <span className="bien-card-type">{titre}</span>
          <div className="bien-card-title">{b.titre||b.adresse?.split(",")[0]||"—"}</div>
          <div className="bien-card-addr"><Ic n="pin" s={12}/>{b.adresse||"Adresse non renseignée"}</div>
          <div className="bien-card-bottom">
            <div><span className="bien-card-loyer">{b.loyer} €</span><span className="bien-card-loyer-sub"> CC/mois</span></div>
            <div className="bien-card-attrs">
              {b.surface&&<span className="bien-card-attr"><Ic n="search" s={11}/>{b.surface} m²</span>}
              {b.meuble!==undefined&&<span className={b.meuble?"dispo-badge ok":"dispo-badge soon"}>{b.meuble?"Meublé":"Vide"}</span>}
            </div>
          </div>
        </div>
      </div>
    );
  };

  return(
    <>
      <div className="topbar">
        <div>
          <div className="pt">Biens disponibles</div>
          <div className="ps">{biens.length} bien{biens.length!==1?"s":""} en portefeuille</div>
        </div>
        <div className="tb-right">
          <div className="search-bar"><Ic n="search" s={14}/><input placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
          <button className="btn btn-p" onClick={()=>setModal({type:"add"})}><Ic n="plus" s={13}/>Ajouter un bien</button>
          <button className="mobile-logout" onClick={()=>fsSignOut(auth)} title="Se déconnecter"><Ic n="logout" s={18}/></button>
        </div>
      </div>
      <div className="main">
        {loading&&<div className="empty-state"><div className="es-t">Chargement…</div></div>}
        {!loading&&rows.length===0&&(
          <div className="empty-state">
            <div className="es-ic">🏠</div>
            <div className="es-t">{search?"Aucun résultat":"Aucun bien en portefeuille"}</div>
            <div>{search?"Essaie un autre terme.":"Ajoute tes premiers biens disponibles."}</div>
          </div>
        )}
        {!loading&&rows.length>0&&<div className="biens-grid">{rows.map(b=><BienThumb key={b.id} b={b}/>)}</div>}
      </div>

      {(modal?.type==="add"||modal?.type==="edit")&&(
        <BienFormModal bien={modal.type==="edit"?modal.bien:null} onSave={saveBien} onClose={()=>setModal(null)} onDelete={deleteBien}/>
      )}
      {modal?.type==="detail"&&(
        <BienDetailModal bien={modal.bien} onClose={()=>setModal(null)} addToast={addToast}
          onEdit={()=>setModal({type:"edit",bien:modal.bien})}/>
      )}
    </>
  );
}

// ─── PARTENAIRE MODAL ────────────────────────────────────────────────────
function PartenaireModal({partenaire, onSave, onClose}){
  const editing = !!partenaire;
  const [form,setForm]=useState({
    agence: partenaire?.agence||"",
    prenom: partenaire?.prenom||"",
    nom:    partenaire?.nom||"",
    phone:  partenaire?.phone||"",
    email:  partenaire?.email||"",
  });
  const [err,setErr]=useState("");
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const submit=()=>{
    if(!form.prenom.trim()&&!form.nom.trim()){setErr("Renseigne au moins un prénom ou un nom.");return;}
    if(!form.agence.trim()){setErr("Le nom de l'agence est obligatoire.");return;}
    setErr("");
    onSave(form);
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{editing?"Modifier le partenaire":"Ajouter un partenaire"}</div>
        <div className="modal-sub">Les informations seront visibles de Charles et Emmy.</div>
        {err&&<div className="ferr">{err}</div>}
        <div className="fg"><label className="fl">Agence *</label><input className="fi" autoFocus value={form.agence} onChange={e=>set("agence",e.target.value)} placeholder="Ex: Foncia Part-Dieu"/></div>
        <div className="fr">
          <div className="fg"><label className="fl">Prénom</label><input className="fi" value={form.prenom} onChange={e=>set("prenom",e.target.value)}/></div>
          <div className="fg"><label className="fl">NOM</label><input className="fi" value={form.nom} onChange={e=>set("nom",e.target.value)}/></div>
        </div>
        <div className="fg"><label className="fl">Téléphone</label><input className="fi" value={form.phone} onChange={e=>set("phone",e.target.value)}/></div>
        <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={form.email} onChange={e=>set("email",e.target.value)}/></div>
        <div className="fa">
          <button className="btn btn-g" onClick={onClose}>Annuler</button>
          <button className="btn btn-p" onClick={submit}><Ic n="check" s={13}/>{editing?"Enregistrer":"Ajouter"}</button>
        </div>
      </div>
    </div>
  );
}

// ─── TODO PAGE (v2 — liste persistante d'Emmy) ───────────────────────────
function TodoPage({user,addToast}){
  const [tasks,setTasks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [newText,setNewText]=useState("");
  const [showDone,setShowDone]=useState(false);

  const myName = displayNameFromEmail(user.email);

  useEffect(()=>{
    const unsub=fsOnSnapshot(fsCollection(db,"todos"),snap=>{
      setTasks(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    },()=>addToast("Erreur chargement to-do","error"));
    return unsub;
  },[]);

  const openTasks = tasks.filter(t=>!t.done).sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));
  const doneTasks = tasks.filter(t=>t.done).sort((a,b)=>new Date(b.doneAt||0)-new Date(a.doneAt||0));
  const total = tasks.length;
  const doneCount = doneTasks.length;
  const pct = total>0 ? Math.round((doneCount/total)*100) : 0;
  const progressColor = pct===100 ? "var(--green)" : pct>=50 ? "var(--accent)" : "var(--orange)";

  const addTask=()=>{
    const text=newText.trim();
    if(!text) return;
    fsAddDoc(fsCollection(db,"todos"),{
      text, done:false, createdBy:myName, createdAt:nowISO(), doneAt:null
    }).then(()=>{setNewText("");}).catch(()=>addToast("Erreur d'ajout","error"));
  };

  const toggleTask=(t)=>{
    const willDone=!t.done;
    fsUpdateDoc(fsDocRef(db,"todos",t.id),{done:willDone, doneAt:willDone?nowISO():null})
      .catch(()=>addToast("Erreur","error"));
  };

  const deleteTask=(t)=>{
    if(!confirm("Supprimer cette tâche ?")) return;
    fsDeleteDoc(fsDocRef(db,"todos",t.id))
      .then(()=>addToast("Tâche supprimée"))
      .catch(()=>addToast("Erreur de suppression","error"));
  };

  const AgeBadge=({t})=>{
    const d=Math.floor(daysSince(t.createdAt));
    if(d>=3) return <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:"var(--orange-bg)",color:"#92400e",whiteSpace:"nowrap"}}>⏳ depuis {d}j</span>;
    if(d<=0) return <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:"var(--surface2)",color:"var(--text2)",whiteSpace:"nowrap"}}>aujourd'hui</span>;
    return <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20,background:"var(--surface2)",color:"var(--text3)",whiteSpace:"nowrap"}}>il y a {d}j</span>;
  };

  const OpenRow=({t})=>{
    const overdue=Math.floor(daysSince(t.createdAt))>=3;
    return(
      <div className="todo-item" style={overdue?{borderLeft:"3px solid var(--orange)"}:{}}>
        <div className="todo-checkbox" onClick={()=>toggleTask(t)}></div>
        <div className="todo-item-body">
          <div className="todo-item-text">{t.text}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <AgeBadge t={t}/>
          <button className="todo-item-del" onClick={()=>deleteTask(t)} title="Supprimer"><Ic n="trash" s={14}/></button>
        </div>
      </div>
    );
  };

  const DoneRow=({t})=>(
    <div className="todo-item done">
      <div className="todo-checkbox checked" onClick={()=>toggleTask(t)}><Ic n="check" s={13}/></div>
      <div className="todo-item-body">
        <div className="todo-item-text">{t.text}</div>
      </div>
      <button className="todo-item-del" onClick={()=>deleteTask(t)} title="Supprimer"><Ic n="trash" s={14}/></button>
    </div>
  );

  return(
    <>
      <div className="topbar">
        <div>
          <div className="pt">To-do</div>
          <div className="ps">Les tâches restent affichées tant qu'elles ne sont pas cochées</div>
        </div>
        <div className="tb-right"><button className="mobile-logout" onClick={()=>fsSignOut(auth)} title="Se déconnecter"><Ic n="logout" s={18}/></button></div>
      </div>
      <div className="main">
        {loading?(
          <div className="empty-state"><div className="es-t">Chargement…</div></div>
        ):(
          <>
            <div className="todo-progress-card">
              <div className="todo-progress-top">
                <span className="todo-progress-label">{openTasks.length} à faire</span>
                <span className="todo-progress-pct" style={{color:progressColor}}>{doneCount} / {total}</span>
              </div>
              <div className="todo-progress-bar-bg"><div className="todo-progress-bar-fill" style={{width:pct+"%",background:progressColor}}/></div>
            </div>

            <div className="todo-add-row">
              <input className="fi" placeholder="Nouvelle tâche…" value={newText}
                onChange={e=>setNewText(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")addTask();}}/>
              <button className="btn btn-p" onClick={addTask}><Ic n="plus" s={13}/>Ajouter</button>
            </div>

            <div style={{fontSize:10,fontWeight:800,color:"var(--accent)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10}}>À faire</div>
            {openTasks.length===0?(
              <div className="todo-empty">Tout est fait. Rien à faire pour le moment.</div>
            ):(
              <div className="todo-list">
                {openTasks.map(t=><OpenRow key={t.id} t={t}/>)}
              </div>
            )}

            <div className="todo-history-toggle" onClick={()=>setShowDone(s=>!s)}>
              <Ic n={showDone?"chevDown":"chevR"} s={13}/>
              Terminées ({doneCount})
            </div>
            {showDone&&(
              doneCount===0?(
                <div className="todo-empty">Aucune tâche terminée.</div>
              ):(
                <div className="todo-list">
                  {doneTasks.map(t=><DoneRow key={t.id} t={t}/>)}
                </div>
              )
            )}
          </>
        )}
      </div>
    </>
  );
}

    },()=>addToast("Erreur chargement finance","error"));
    return unsub;
  },[]);

  // Import auto des dossiers validés (une seule fois par lead via financeLogged)
  useEffect(()=>{
    if(loading) return;
    leads.filter(l=>l.column==="valide" && !l.financeLogged).forEach(l=>{
      if(creatingRef.current.has(l.id)) return;
      creatingRef.current.add(l.id);
      const info=prestationFromLead(l);
      const iso=l.validatedAt||nowISO();
      const entry={
        type:"in",
        label:"Client logé - "+l.name,
        amount:info.pending?0:round2(info.ttc/1.2),
        ttc:info.pending?null:info.ttc,
        pending:info.pending,
        source:"auto",
        leadId:l.id,
        createdAt:iso,
        monthKey:monthKeyFromISO(iso)
      };
      fsAddDoc(fsCollection(db,"finance"),entry)
        .then(()=>fsUpdateDoc(fsDocRef(db,"leads",l.id),{financeLogged:true}))
        .catch(()=>{creatingRef.current.delete(l.id);});
    });
  },[leads,loading]);

  // Seed unique des mouvements de juin 2026 (antérieurs à SOLOC) — ne s'exécute qu'une fois
  useEffect(()=>{
    if(loading || seededRef.current) return;
    if(finance.some(f=>f.seedTag==="june2026")){ seededRef.current=true; return; }
    seededRef.current=true;
    const juneISO="2026-06-15T12:00:00.000Z";
    const base={ pending:false, source:"manuel", leadId:null, createdAt:juneISO, monthKey:"2026-06", seedTag:"june2026" };
    const items=[
      {...base, type:"in",  label:"Client logé - Juline MALEYSSON", amount:round2(890/1.2), ttc:890},
      {...base, type:"in",  label:"Client logé - Inès CHAMBON",     amount:round2(890/1.2), ttc:890},
      {...base, type:"out", label:"Commission Kevin (due)",      amount:889.98, ttc:null},
      {...base, type:"out", label:"Google Ads juin",             amount:365,    ttc:null},
      {...base, type:"out", label:"Flyers écoles",               amount:33.99,  ttc:null}
    ];
    Promise.all(items.map(it=>fsAddDoc(fsCollection(db,"finance"),it))).catch(()=>{seededRef.current=false;});
  },[loading,finance]);

  const fMonth=(f)=>f.monthKey||monthKeyFromISO(f.createdAt);
  const sumIn=(arr)=>arr.filter(f=>f.type==="in").reduce((s,f)=>s+(f.amount||0),0);
  const sumOut=(arr)=>arr.filter(f=>f.type==="out").reduce((s,f)=>s+(f.amount||0),0);

  const currentMK=todayKey().slice(0,7);
  const monthsPresent=Array.from(new Set(finance.map(fMonth)));
  const months=Array.from(new Set(monthsPresent.concat([currentMK]))).sort();
  useEffect(()=>{ if(curMonth===null && months.length) setCurMonth(months[months.length-1]); },[months,curMonth]);
  const activeMonth=curMonth||currentMK;

  const view=globalView?finance:finance.filter(f=>fMonth(f)===activeMonth);
  const globIn=sumIn(finance), globOut=sumOut(finance);
  const vin=sumIn(view), vout=sumOut(view);
  const maxNet=Math.max.apply(null,months.map(mk=>Math.abs(sumIn(finance.filter(f=>fMonth(f)===mk))-sumOut(finance.filter(f=>fMonth(f)===mk)))).concat([1]));

  const prevMonth=()=>{ const i=months.indexOf(activeMonth); if(i>0){setGlobalView(false);setCurMonth(months[i-1]);} };
  const nextMonth=()=>{ const i=months.indexOf(activeMonth); if(i<months.length-1){setGlobalView(false);setCurMonth(months[i+1]);} };

  const openForm=(type)=>{ setEditId(null); setFormType(type); setFTtc(type==="in"); setFLabel(""); setFAmount(""); setFDate(""); };
  const openEdit=(f)=>{ setEditId(f.id); setFormType(f.type); setFLabel(f.label||""); setFAmount(String(f.amount||0)); setFTtc(false); setFDate(f.createdAt?String(f.createdAt).slice(0,10):""); };
  const closeForm=()=>{ setFormType(null); setEditId(null); };
  const save=()=>{
    const lbl=fLabel.trim(); const v=parseFloat(fAmount)||0;
    if(!lbl||!v){ addToast("Renseigne un libellé et un montant","error"); return; }
    const amountHT = fTtc ? round2(v/1.2) : round2(v);
    const iso = fDate ? new Date(fDate+"T12:00:00").toISOString() : nowISO();
    const payload = { type:formType, label:lbl, amount:amountHT, ttc:fTtc?v:null, pending:false, createdAt:iso, monthKey:monthKeyFromISO(iso) };
    if(editId){
      fsUpdateDoc(fsDocRef(db,"finance",editId), payload)
        .then(()=>{ closeForm(); addToast("✓ Mouvement modifié"); })
        .catch(()=>addToast("Erreur","error"));
    } else {
      fsAddDoc(fsCollection(db,"finance"), {...payload, source:"manuel", leadId:null})
        .then(()=>{ closeForm(); addToast("✓ Mouvement ajouté"); })
        .catch(()=>addToast("Erreur d'ajout","error"));
    }
  };
  const del=(f)=>{
    if(!confirm("Supprimer ce mouvement ?")) return;
    fsDeleteDoc(fsDocRef(db,"finance",f.id)).then(()=>addToast("Mouvement supprimé")).catch(()=>addToast("Erreur","error"));
  };
  const complete=(f)=>{
    const raw=prompt("Montant de la prestation en TTC ? (converti en HT ÷1,2)");
    if(raw===null) return;
    const v=parseFloat(String(raw).replace(",","."))||0;
    if(!v) return;
    fsUpdateDoc(fsDocRef(db,"finance",f.id),{amount:Math.round(v/1.2), ttc:v, pending:false})
      .then(()=>addToast("✓ Montant renseigné")).catch(()=>addToast("Erreur","error"));
  };

  const cardStyle={background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"13px 15px"};
  const htPreview = (fTtc&&fAmount) ? ("= "+eurFmt((parseFloat(fAmount)||0)/1.2)+" HT") : "";

  return(
    <>
      <div className="topbar">
        <div>
          <div className="pt">Finance</div>
          <div className="ps">Montants en HT — entrées auto depuis les dossiers validés</div>
        </div>
        <div className="tb-right"><button className="mobile-logout" onClick={()=>fsSignOut(auth)} title="Se déconnecter"><Ic n="logout" s={18}/></button></div>
      </div>
      <div className="main">
        {loading?(
          <div className="empty-state"><div className="es-t">Chargement…</div></div>
        ):(
          <>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:8,opacity:globalView?.4:1,pointerEvents:globalView?"none":"auto"}}>
                <button className="ib" style={{border:"1.5px solid var(--border2)",borderRadius:8}} onClick={prevMonth}><Ic n="chevL" s={15}/></button>
                <span style={{fontSize:14,fontWeight:700,minWidth:120,textAlign:"center"}}>{monthLabel(activeMonth)}</span>
                <button className="ib" style={{border:"1.5px solid var(--border2)",borderRadius:8}} onClick={nextMonth}><Ic n="chevR" s={15}/></button>
              </div>
              <button className="btn btn-g" style={globalView?{background:"var(--ardoise)",color:"#fff",borderColor:"var(--ardoise)"}:{}} onClick={()=>setGlobalView(g=>!g)}>Global</button>
            </div>

            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"1.3fr 1fr 1fr 1fr",gap:10,marginBottom:18}}>
              <div style={{background:"var(--ardoise)",borderRadius:12,padding:"13px 15px"}}>
                <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.55)",textTransform:"uppercase",letterSpacing:".06em"}}>Solde global HT</div>
                <div className="brand-font" style={{fontSize:24,fontWeight:800,color:"#fff",marginTop:4}}>{eurFmt(globIn-globOut)}</div>
              </div>
              <div style={cardStyle}>
                <div style={{fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em"}}>{globalView?"Tout l'historique":"Net du mois"}</div>
                <div className="brand-font" style={{fontSize:22,fontWeight:800,marginTop:4,color:(vin-vout)>=0?"var(--text)":"var(--red)"}}>{eurFmt(vin-vout)}</div>
                <div style={{fontSize:10,color:"var(--text3)",marginTop:1}}>Net HT</div>
              </div>
              <div style={cardStyle}>
                <div style={{fontSize:10,fontWeight:700,color:"var(--green)",textTransform:"uppercase",letterSpacing:".06em"}}>Entrées</div>
                <div className="brand-font" style={{fontSize:22,fontWeight:800,marginTop:4,color:"var(--green)"}}>{eurFmt(vin)}</div>
              </div>
              <div style={cardStyle}>
                <div style={{fontSize:10,fontWeight:700,color:"var(--red)",textTransform:"uppercase",letterSpacing:".06em"}}>Sorties</div>
                <div className="brand-font" style={{fontSize:22,fontWeight:800,marginTop:4,color:"var(--red)"}}>{eurFmt(vout)}</div>
              </div>
            </div>

            <div style={{...cardStyle,marginBottom:18}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--text2)",marginBottom:12}}>Net HT par mois</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:18,height:90,paddingLeft:4,overflowX:"auto"}}>
                {months.map(mk=>{
                  const net=sumIn(finance.filter(f=>fMonth(f)===mk))-sumOut(finance.filter(f=>fMonth(f)===mk));
                  const h=Math.max(6,Math.round(Math.abs(net)/maxNet*70));
                  const active=!globalView&&mk===activeMonth;
                  return(
                    <div key={mk} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer",flexShrink:0}} onClick={()=>{setGlobalView(false);setCurMonth(mk);}}>
                      <div style={{fontSize:11,fontWeight:700,color:active?"var(--accent)":"var(--text2)",whiteSpace:"nowrap"}}>{eurFmt(net)}</div>
                      <div style={{width:46,height:h,borderRadius:"6px 6px 0 0",background:active?"var(--accent)":"var(--accent-l2)"}}></div>
                      <div style={{fontSize:10,color:"var(--text3)",fontWeight:600}}>{monthLabel(mk).split(" ")[0].slice(0,4)}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{display:"flex",gap:10,marginBottom:8}}>
              <button className="btn btn-block" style={{background:"var(--green)",color:"#fff"}} onClick={()=>openForm("in")}><Ic n="plus" s={13}/>Entrée</button>
              <button className="btn btn-block" style={{background:"var(--red)",color:"#fff"}} onClick={()=>openForm("out")}><Ic n="minus" s={13}/>Dépense</button>
            </div>

            {formType&&(
              <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:12,padding:14,marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>{editId?"Modifier le mouvement":(formType==="in"?"Nouvelle entrée":"Nouvelle dépense")}</div>
                {editId&&(
                  <div className="seg" style={{marginBottom:10}}>
                    <button type="button" className="seg-btn" style={formType==="in"?{background:"var(--accent)",borderColor:"var(--accent)",color:"#fff"}:{}} onClick={()=>setFormType("in")}>Entrée</button>
                    <button type="button" className="seg-btn" style={formType==="out"?{background:"var(--accent)",borderColor:"var(--accent)",color:"#fff"}:{}} onClick={()=>setFormType("out")}>Dépense</button>
                  </div>
                )}
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <input className="fi" style={{flex:2}} placeholder="Libellé" value={fLabel} onChange={e=>setFLabel(e.target.value)} autoFocus/>
                  <input className="fi" style={{flex:1}} type="number" placeholder="Montant €" value={fAmount} onChange={e=>setFAmount(e.target.value)}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <input className="fi" style={{flex:1}} type="date" value={fDate} onChange={e=>setFDate(e.target.value)}/>
                  <span style={{fontSize:10,color:"var(--text3)",whiteSpace:"nowrap"}}>vide = aujourd'hui</span>
                </div>
                <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:"var(--text2)",marginBottom:10,cursor:"pointer"}}>
                  <input type="checkbox" checked={fTtc} onChange={e=>setFTtc(e.target.checked)}/> C'est un montant TTC → convertir en HT (÷1,2)
                  <span style={{marginLeft:"auto",fontWeight:700,color:"var(--accent)"}}>{htPreview}</span>
                </label>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button className="btn btn-g" onClick={closeForm}>Annuler</button>
                  <button className="btn btn-p" onClick={save}><Ic n="check" s={13}/>Ajouter</button>
                </div>
              </div>
            )}

            <div style={{fontSize:10,fontWeight:800,color:"var(--accent)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>{globalView?"Mouvements — tout l'historique":"Mouvements — "+monthLabel(activeMonth)}</div>
            <div style={{...cardStyle,padding:0}}>
              {view.length===0?(
                <div style={{padding:22,textAlign:"center",color:"var(--text3)",fontSize:12,fontStyle:"italic"}}>Aucun mouvement sur cette période.</div>
              ):(
                view.slice().sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).map((f,idx,arr)=>{
                  const isIn=f.type==="in";
                  return(
                    <div key={f.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 13px",borderBottom:idx<arr.length-1?"1px solid var(--border)":"none"}}>
                      <div style={{width:30,height:30,borderRadius:8,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:isIn?"var(--green-bg)":"var(--red-bg)",color:isIn?"var(--green)":"var(--red)"}}><Ic n={isIn?"arrowUp":"arrowDown"} s={15}/></div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600}}>{f.label}</div>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3,flexWrap:"wrap"}}>
                          <span style={{fontSize:10,color:"var(--text3)"}}>{fmtDate(f.createdAt)}</span>
                          {f.source==="auto"
                            ?<span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20,background:"#EFF6FF",color:"#1d4ed8"}}>AUTO · validé</span>
                            :<span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20,background:"var(--surface2)",color:"var(--text2)"}}>MANUEL</span>}
                          {f.pending&&<span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20,background:"var(--orange-bg)",color:"#92400e"}}>à compléter</span>}
                        </div>
                      </div>
                      {f.pending
                        ?<button className="btn btn-g btn-sm" onClick={()=>complete(f)}>Compléter</button>
                        :<div className="brand-font" style={{fontSize:15,fontWeight:800,color:isIn?"var(--green)":"var(--red)",whiteSpace:"nowrap"}}>{(isIn?"+":"−")+eurFmt(f.amount||0)}</div>}
                      <button className="ib" onClick={()=>openEdit(f)} title="Modifier"><Ic n="edit" s={14}/></button>
                      <button className="ib" style={{color:"var(--text3)"}} onClick={()=>del(f)} title="Supprimer"><Ic n="trash" s={14}/></button>
                    </div>
                  );
                })
              )}
            </div>
          </>
        )}
      </div>
    </>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(undefined);
  const [leads,setLeads]=useState([]);
  const [tab,setTab]=useState("pipeline");
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null); // {type:'add'} | {type:'detail',lead} | {type:'gate',lead}
  const [toasts,addToast]=useToasts();
  const isMobile=useIsMobile();

  useEffect(()=>{
    const unsub=fsOnAuthStateChanged(auth,u=>setUser(u));
    return unsub;
  },[]);

  useEffect(()=>{
    if(!user) return;
    const unsub=fsOnSnapshot(fsCollection(db,"leads"),snap=>{
      setLeads(snap.docs.map(d=>({id:d.id,...d.data()})));
    },err=>addToast("Erreur de synchronisation","error"));
    return unsub;
  },[user]);

  if(user===undefined) return <div style={{minHeight:"100vh",background:"var(--ardoise)"}}/>;
  if(user===null) return (<><style>{CSS}</style><LoginScreen/></>);

  const eventLabel=(col)=>({
    sans_suite:"❌ Passé en Sans suite",
    premier_contact:"↩️ Remis en Premier contact",
    relance:"📞 Passé en Relance",
    envoye:"✉️ Dossier envoyé",
    en_traitement:"🔍 Passé en traitement",
    en_recherche:"🏠 Critères validés — recherche démarrée",
    en_commission:"📑 Passé en commission",
    valide:"✅ Bail validé",
  }[col]||"Statut mis à jour");

  const addLead=(form)=>{
    const fullName=[form.firstName.trim(),form.lastName.trim()].filter(Boolean).join(" ");
    const doc={
      firstName:form.firstName, lastName:form.lastName, name:fullName,
      phone:form.phone, email:form.email,
      column:"premier_contact", relanceCount:0, paid:false, notes:"",
      criteria:blankCriteria,
      createdAt:nowISO(), lastActivity:nowISO(),
      history:[mkEvent("🌱","Lead créé")]
    };
    fsAddDoc(fsCollection(db,"leads"),doc).then(()=>addToast("✓ "+fullName+" ajouté")).catch(()=>addToast("Erreur d'ajout","error"));
    setModal(null);
  };

  const moveLead=(id,col)=>{
    const lead=leads.find(l=>l.id===id);
    if(!lead||lead.column===col) return;
    if(col==="en_recherche"&&!criteriaComplete(lead.criteria)){
      setModal({type:"gate",lead});
      return;
    }
    const moveExtra = col==="valide" ? {validatedAt:nowISO()} : {};
    fsUpdateDoc(fsDocRef(db,"leads",id),{
      column:col, lastActivity:nowISO(), ...moveExtra,
      history:[...(lead.history||[]),mkEvent("",eventLabel(col))]
    }).then(()=>addToast(PIPELINE_COLS.find(c=>c.id===col)?.label+" — "+lead.name));
  };

  const relanceAction=(lead)=>{
    const newCount=(lead.relanceCount||0)+1;
    if(newCount>=3){
      fsUpdateDoc(fsDocRef(db,"leads",lead.id),{
        column:"sans_suite", relanceCount:newCount, lastActivity:nowISO(),
        history:[...(lead.history||[]),mkEvent("❌","3 relances sans réponse — passé en Sans suite")]
      }).then(()=>addToast(lead.name+" passé en Sans suite","error"));
    } else {
      fsUpdateDoc(fsDocRef(db,"leads",lead.id),{
        relanceCount:newCount, lastActivity:nowISO(),
        history:[...(lead.history||[]),mkEvent("📵",`Relance ${newCount}/3 — pas de réponse`)]
      }).then(()=>addToast("Relance "+newCount+"/3 — "+lead.name));
    }
  };

  const togglePaid=(lead)=>{
    const paid=!lead.paid;
    fsUpdateDoc(fsDocRef(db,"leads",lead.id),{
      paid, lastActivity:nowISO(),
      history:[...(lead.history||[]),mkEvent(paid?"💶":"↩️",paid?"Marqué payé":"Paiement annulé")]
    }).then(()=>addToast(paid?"✓ Marqué payé":"Paiement annulé"));
  };

  const saveDetail=(lead,form,targetCol)=>{
    const colChanged = targetCol!==lead.column;
    const hist=[...(lead.history||[])];
    if(colChanged) hist.push(mkEvent("",eventLabel(targetCol)));
    const valExtra = (targetCol==="valide" && lead.column!=="valide") ? {validatedAt:nowISO()} : {};
    fsUpdateDoc(fsDocRef(db,"leads",lead.id),{
      phone:form.phone, email:form.email, notes:form.notes,
      criteria:form.criteria, column:targetCol, ...valExtra,
      lastActivity:nowISO(), history:hist
    }).then(()=>{addToast("✓ "+lead.name+" mis à jour");setModal(null);});
  };

  const deleteLead=(lead)=>{
    if(!confirm("Supprimer "+lead.name+" ?")) return;
    fsDeleteDoc(fsDocRef(db,"leads",lead.id)).then(()=>{addToast(lead.name+" supprimé");setModal(null);});
  };

  const mergeLeads=(keep,drop)=>{
    if(!keep||!drop) return;
    const hist=[...(keep.history||[]),...(drop.history||[]),mkEvent("🔗","Fusionnée avec le doublon « "+drop.name+" »")].sort((a,b)=>new Date(a.at||0)-new Date(b.at||0));
    const notes=[keep.notes,drop.notes].filter(Boolean).join("\n— — —\n");
    fsUpdateDoc(fsDocRef(db,"leads",keep.id),{
      phone:keep.phone||drop.phone||"",
      email:keep.email||drop.email||"",
      criteria:mergeCriteria(keep.criteria,drop.criteria),
      calendlyRdv:keep.calendlyRdv||drop.calendlyRdv||null,
      whatsappContact:keep.whatsappContact||drop.whatsappContact||null,
      calendlyEventUri:keep.calendlyEventUri||drop.calendlyEventUri||null,
      notes:notes, history:hist, lastActivity:nowISO()
    }).then(()=>fsDeleteDoc(fsDocRef(db,"leads",drop.id)))
      .then(()=>{addToast("✓ Fiches fusionnées");setModal(null);})
      .catch(()=>addToast("Erreur de fusion","error"));
  };

  const q=search.toLowerCase();
  const filteredLeads = leads.filter(l=>!q||l.name.toLowerCase().includes(q)||(l.phone||"").includes(q)||(l.email||"").toLowerCase().includes(q));

  const partnersOf=(lead)=>{ if(!lead) return []; const ph=normPhone(lead.phone); const em=normEmail(lead.email); return leads.filter(o=>o.id!==lead.id && ((ph&&normPhone(o.phone)===ph)||(em&&normEmail(o.email)===em))); };
  const dupeIds=new Set();
  leads.forEach(l=>{ if(partnersOf(l).length>0) dupeIds.add(l.id); });

  return(
    <>
      <style>{CSS}</style>
      <div className="app">
        <aside className="sb">
          <div className="sb-brand">
            <div className="sb-logo">S</div>
            <div><div className="sb-name">soloc'</div><div className="sb-sub">ESPACE PRO</div></div>
          </div>
          <div className="sb-nav">
            <div className={"nav-item"+(tab==="pipeline"?" active":"")} onClick={()=>setTab("pipeline")}><Ic n="trendUp" s={16}/>Pipeline</div>
            <div className={"nav-item"+(tab==="recherche"?" active":"")} onClick={()=>setTab("recherche")}><Ic n="table" s={16}/>Recherche</div>
            <div className={"nav-item"+(tab==="biens"?" active":"")} onClick={()=>setTab("biens")}><Ic n="home" s={16}/>Biens</div>
            <div className={"nav-item"+(tab==="partenaires"?" active":"")} onClick={()=>setTab("partenaires")}><Ic n="users" s={16}/>Partenaires</div>
            <div className={"nav-item"+(tab==="todo"?" active":"")} onClick={()=>setTab("todo")}><Ic n="listCheck" s={16}/>To-do</div>
            {user.email===FINANCE_EMAIL&&<div className={"nav-item"+(tab==="finance"?" active":"")} onClick={()=>setTab("finance")}><Ic n="wallet" s={16}/>Finance</div>}
          </div>
          <div className="sb-footer">
            <div className="sb-user">{displayNameFromEmail(user.email)}</div>
            <button className="logout-btn" onClick={()=>fsSignOut(auth)}><Ic n="logout" s={14}/>Se déconnecter</button>
          </div>
        </aside>

        <div className="content">
          {(tab==="finance"&&user.email===FINANCE_EMAIL)
            ? <FinancePage user={user} leads={leads} addToast={addToast} isMobile={isMobile}/>
            : tab==="partenaires"
            ? <PartenairesPage addToast={addToast}/>
            : tab==="biens"
            ? <BiensPage addToast={addToast}/>
            : tab==="todo"
            ? <TodoPage user={user} addToast={addToast}/>
            : (<>
              <div className="topbar">
                <div>
                  <div className="pt">{tab==="pipeline"?"Pipeline":"Recherche"}</div>
                  <div className="ps">{tab==="pipeline"?leads.length+" lead"+(leads.length!==1?"s":"")+" au total":"Recherches en cours en un coup d'œil"}</div>
                </div>
                <div className="tb-right">
                  <div className="search-bar"><Ic n="search" s={14}/><input placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
                  {tab==="pipeline"&&<button className="btn btn-p" onClick={()=>setModal({type:"add"})}><Ic n="plus" s={13}/>Ajouter un lead</button>}
                  <button className="mobile-logout" onClick={()=>fsSignOut(auth)} title="Se déconnecter"><Ic n="logout" s={18}/></button>
                </div>
              </div>
              <div className="main">
                {tab==="pipeline"
                  ? <KanbanBoard leads={filteredLeads} onOpen={lead=>setModal({type:"detail",lead})} onMove={moveLead} onRelanceAction={relanceAction} onTogglePaid={togglePaid} isMobile={isMobile} dupeIds={dupeIds}/>
                  : <RechercheTable leads={filteredLeads} search={search}/>}
              </div>
            </>)}
        </div>

        <nav className="bottom-nav">
          <button className={"bn-item"+(tab==="pipeline"?" active":"")} onClick={()=>setTab("pipeline")}><Ic n="trendUp" s={21}/>Pipeline</button>
          <button className={"bn-item"+(tab==="recherche"?" active":"")} onClick={()=>setTab("recherche")}><Ic n="table" s={21}/>Recherche</button>
          <button className={"bn-item"+(tab==="biens"?" active":"")} onClick={()=>setTab("biens")}><Ic n="home" s={21}/>Biens</button>
          <button className={"bn-item"+(tab==="partenaires"?" active":"")} onClick={()=>setTab("partenaires")}><Ic n="users" s={21}/>Agents</button>
          <button className={"bn-item"+(tab==="todo"?" active":"")} onClick={()=>setTab("todo")}><Ic n="listCheck" s={21}/>To-do</button>
          {user.email===FINANCE_EMAIL&&<button className={"bn-item"+(tab==="finance"?" active":"")} onClick={()=>setTab("finance")}><Ic n="wallet" s={21}/>Finance</button>}
        </nav>
      </div>

      {modal?.type==="add"&&<AddLeadModal onSave={addLead} onClose={()=>setModal(null)}/>}
      {(modal?.type==="detail"||modal?.type==="gate")&&
        <LeadDetailModal lead={modal.lead} gateTarget={modal.type==="gate"} onClose={()=>setModal(null)} onSave={saveDetail} onDelete={deleteLead}
          dupePartners={partnersOf(modal.lead)} onMerge={(p)=>setModal({type:"merge",a:modal.lead,b:p})}/>}
      {modal?.type==="merge"&&
        <MergeModal leadA={modal.a} leadB={modal.b} onClose={()=>setModal(null)} onConfirm={mergeLeads}/>}

      <div className="toast-wrap">
        {toasts.map(t=><div key={t.id} className={"toast"+(t.type==="error"?" error":"")}>{t.text}</div>)}
      </div>
    </>
  );
}

function boot(){
  const fb = window.__fb;
  auth = fb.auth; db = fb.db;
  fsOnAuthStateChanged = fb.onAuthStateChanged;
  fsSignIn = fb.signInWithEmailAndPassword;
  fsSignOut = fb.signOut;
  fsCollection = fb.collection;
  fsOnSnapshot = fb.onSnapshot;
  fsAddDoc = fb.addDoc;
  fsDocRef = fb.doc;
  fsUpdateDoc = fb.updateDoc;
  fsDeleteDoc = fb.deleteDoc;
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App/>);
}
if(window.__fb) boot(); else window.addEventListener("fbready", boot, {once:true});
</script>
